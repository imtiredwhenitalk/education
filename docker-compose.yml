services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend-python
    container_name: school_backend_py
    env_file:
      - ./backend_py/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend_py/data:/app/backend_py/data
      - ./backend_py:/app/backend_py

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: school_frontend
    environment:
      - VITE_API_TARGET=https://education-1-0uro.onrender.com
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./:/app
      - /app/node_modules
