services:
  db:
    image: postgres:16-alpine
    container_name: school_postgres
    environment:
      POSTGRES_DB: education
      POSTGRES_USER: education
      POSTGRES_PASSWORD: education
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend-python
    container_name: school_backend_py
    env_file:
      - ./backend_py/.env
    environment:
      - DATABASE_URL=postgresql://education:education@db:5432/education
      - IMPORT_NEWS_FROM_JSON=1
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend_py/data:/app/backend_py/data
      - ./backend_py:/app/backend_py

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: school_frontend
    environment:
      - VITE_API_TARGET=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  pgdata:
